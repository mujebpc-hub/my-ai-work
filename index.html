<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MyGPT</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

    <div class="sidebar">

        <h1>MyGPT</h1>

        <button id="newChatBtn">
            + New Chat
        </button>

    </div>

    <div class="chatArea">

        <div class="topBar">

            <h2>MyGPT AI</h2>

        </div>

        <div id="chatBox"></div>

        <div class="inputArea">

            <input
            type="text"
            id="userInput"
            placeholder="Ask Anything..."
            >

            <button id="sendBtn">
                Send
            </button>

            <button id="imageBtn">
                Image
            </button>

        </div>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
